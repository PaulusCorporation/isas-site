<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — ISAS</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1B3A6B;
      --gold: #C9A94E;
      --text-muted: #5a6478;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F4F6FA;
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      opacity: .08;
      position: absolute;
      user-select: none;
    }
    .content { position: relative; z-index: 1; max-width: 480px; }
    .cross {
      width: 64px; height: 64px;
      background: var(--primary);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.8rem;
      color: var(--gold);
      font-weight: 700;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      margin-bottom: 12px;
    }
    p { color: var(--text-muted); font-size: 1rem; line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary);
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      font-size: .95rem;
      transition: background .2s;
    }
    a:hover { background: #0D2247; }
    a:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
  </style>
</head>
<body>
  <span class="code" aria-hidden="true">404</span>
  <div class="content">
    <div class="cross" aria-hidden="true">✚</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido.<br>Volte à página inicial do ISAS.</p>
    <a href="/isas-site/">← Voltar ao início</a>
  </div>
</body>
</html>
